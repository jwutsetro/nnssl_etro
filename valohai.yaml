---

- step:
    name: filter_all_mri_to_datasets
    image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
    command:
      - pip install .
      - python ./nnssl/scrips/fine_grained_vh_inputs.py
      # - python ./fiona/nnssl/valohai_tester.py
    inputs:
    - name: all-data
      description: Dataset containing all raw data we want to use.
      default: s3://floy-data/clean-data/external/fiona/mr-head-full/*.nii.gz
    - name: meta-data
      description: Meta data csv input
      default: dataset://fiona_full_meta/v0


- step:
    name: filter_raw_dataset_to_clean_dataset
    image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
    command:
      - pip install .
      - python ./nnssl/scripts/raw_dataset_to_filtered_dataset.py {parameters}
    parameters:
    - name: dataset_name
      description: Dataset that will will be preprocessed
      pass-as: --dataset_name {v}
      type: string
    - name: dataset_version
      description: Type of fingerprint to use
      pass-as: --version {v}
      type: string

    inputs:
    - name: raw-data
      description: Dataset that will be preprocessed



- step:
    name: plan_and_preprocess_dataset
    image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
    command:
      - pip install .
      - python ./nnssl/experiment_planning/plan_and_preprocess_entrypoints.py {parameters}
      # - python ./fiona/nnssl/valohai_tester.py
    parameters:
    - name: dataset_id
      description: Dataset that will will be preprocessed
      default: 737
      pass-as: -d {v}
      type: string
    - name: fingerprint_type
      description: Type of fingerprint to use
      default: DatasetFingerprintExtractor
      pass-as: -fpe {v}
      type: string
    - name: num_processes_fingerprinting
      description: Number of processes to use for fingerprinting
      default: 8
      pass-as: -npfp {v}
      type: integer
    - name: verify_dataset_integrity
      default: True
      type: flag
      pass-true-as: "--verify_dataset_integrity"
      pass-false-as: ""
    - name: No Preprocessing
      default: False
      type: flag
      pass-true-as: "--no_pp"
      pass-false-as: ""
    - name: Clean
      default: False
      type: flag
      pass-true-as: "--clean"
      pass-false-as: ""
    - name: Planner
      default: ExperimentPlanner
      type: string
      pass-as: -pl {v}
    - name: gpu_memory_target
      default: 11
      type: string
      pass-as: -gpu_memory_target {v}
    - name: preprocessor_name
      default: DefaultPreprocessor
      pass-as: -preprocessor_name {v}
    # - name: overwrite_plans_name
    #   default: nnsslPlans
    #   pass-as: -overwrite_target_spacing {}
    #   required: False
    #   type: list
    - name: configuration
      default: 3d_fullres
      pass-as: -c {v}

    inputs:
    - name: raw-data
      description: Dataset that will be preprocessed
      default: dataset://fiona-300-dev/v3



- step:
    name: train_ssl
    image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
    command:
      - pip install .
      - python ./nnssl/run/run_training.py {parameters}
      # - python ./fiona/nnssl/valohai_tester.py
    parameters:
    - name: dataset_id
      description: Dataset that will will be preprocessed
      default: 737
      type: string
      pass-as: "{v}"
    - name: configuration
      description: Configuration to train
      default: 3d_fullres
      type: string
      pass-as: "{v}"
    - name: trainer_class
      description: Trainer class
      default: BaseMAETrainer
      pass-as: -tr {v}
      type: string
    - name: plans
      description: Plans name
      default: nnsslPlans
      pass-as: -p {v}
      type: string
    - name: num_gpus
      description: Number of GPUs to use for training
      default: 1
      pass-as: -num_gpus {v}
      type: integer

    inputs:
    - name: pp-data
      description: Dataset that will be preprocessed
      default: dataset://pp-fiona-Dataset737/v1

