---
- step:
    name: hello_world
    image: python:3.10
    command:
      - python ./nnssl/valohai_tester.py
      # - python ./fiona/nnssl/valohai_tester.py

- step:
    name: create_dev_dataset
    image: python:3.10
    command:
      - pip install .
      - python ./nnssl/dataset_conversion/fiona_dev_300_v2.py
      # - python ./fiona/nnssl/valohai_tester.py
    inputs:
    - name: raw-data
      description: Dataset that will be preprocessed
      default: dataset://fiona-300-dev/v1


- step:
    name: plan_and_preprocess_dataset
    image: python:3.10
    command:
      - pip install .
      - python ./nnssl/experiment_planning/plan_and_preprocess_entrypoints.py {parameters}
      # - python ./fiona/nnssl/valohai_tester.py
    parameters:
    - name: dataset_id
      description: Dataset that will will be preprocessed
      default: 737
      pass-as: -d {v}
      type: string
    - name: fingerprint_type
      description: Type of fingerprint to use
      default: DatasetFingerprintExtractor
      pass-as: -fpe {v}
      type: string
    - name: num_processes_fingerprinting
      description: Number of processes to use for fingerprinting
      default: 8
      pass-as: -npfp {v}
      type: integer
    - name: verify_dataset_integrity
      default: True
      type: flag
      pass-true-as: "--verify_dataset_integrity"
      pass-false-as: ""
    - name: No Preprocessing
      default: False
      type: flag
      pass-true-as: "--no_pp"
      pass-false-as: ""
    - name: Clean
      default: False
      type: flag
      pass-true-as: "--clean"
      pass-false-as: ""
    - name: Planner
      default: ExperimentPlanner
      type: string
      pass-as: -pl {v}
    - name: gpu_memory_target
      default: 11
      type: string
      pass-as: -gpu_memory_target {v}
    - name: preprocessor_name
      default: DefaultPreprocessor
      pass-as: -preprocessor_name {v}
    # - name: overwrite_plans_name
    #   default: nnsslPlans
    #   pass-as: -overwrite_target_spacing {}
    #   required: False
    #   type: list
    - name: configuration
      default: 3d_fullres
      pass-as: -c {v}

    inputs:
    - name: raw-data
      description: Dataset that will be preprocessed
      default: dataset://fiona-300-dev/v3

